<section class="panel" id="perfil-jogo">
      <div class="space-y-4">
        <div class="rounded-3xl border border-brand/20 p-6 text-white shadow-lift relative overflow-hidden" style="background: linear-gradient(135deg, var(--cc-brand) 0%, var(--cc-brand-soft) 100%);">
          <!-- Brilho decorativo -->
          <div class="absolute -top-10 -left-10 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
          
          <div class="relative z-10 flex items-start justify-between gap-3">
            <div>
              <p class="text-[9px] font-black uppercase tracking-[0.3em] text-white/60 font-mono">FINANCIAL IDENTITY</p>
              <h2 id="gameProfileName" class="mt-1 text-3xl font-black tracking-tighter font-serif">Jogador</h2>
              <p id="gameProfileTitle" class="mt-0.5 text-xs font-bold text-white/80 uppercase tracking-widest">Iniciante</p>
            </div>
            <span id="gameProfileBadge" class="rounded-full border border-white/30 bg-white/15 px-3 py-1 text-[9px] font-black inline-flex items-center gap-2 backdrop-blur-md font-mono">🌱 EVOLVING</span>
          </div>

          <div class="relative z-10 mt-8">
            <div class="flex items-center justify-between text-[10px] font-bold text-white/90 uppercase tracking-widest font-mono">
              <span id="gameProfileLevelLine">LVL 1</span>
              <span id="gameProfileXpLine">0 / 100 XP</span>
            </div>
            <div class="mt-2.5 h-3 w-full overflow-hidden rounded-full bg-black/20 backdrop-blur-sm border border-white/5">
              <div id="gameProfileProgressBar" class="h-full rounded-full bg-white transition-[width] duration-1000 ease-out shadow-[0_0_15px_rgba(255,255,255,0.6)]" style="width: 0%"></div>
            </div>
            <p id="gameProfileNextHint" class="mt-4 text-[10px] font-medium text-white/70 italic">Faltam 0 XP para o próximo nível</p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="glass-card rounded-3xl p-5">
            <p class="text-[9px] font-black uppercase tracking-[0.2em] text-telegram-hint font-mono">TOTAL ACTIONS</p>
            <p id="gameInteractionsTotal" class="mt-2 text-3xl font-black text-telegram-text font-financial">0</p>
          </div>
          <button onclick="switchTabByName('missoes')" class="glass-card rounded-3xl p-5 text-left border border-brand/20 bg-brand/5 relative overflow-hidden">
            <div class="absolute -right-4 -bottom-4 opacity-5">
                <i data-lucide="target" class="w-20 h-20 text-brand"></i>
            </div>
            <p class="text-[9px] font-black uppercase tracking-[0.2em] text-brand font-mono">DAILY MISSIONS</p>
            <div class="flex items-center justify-between mt-2">
              <span id="gameMissionsCount" class="text-3xl font-black text-telegram-text font-financial">0</span>
              <i data-lucide="chevron-right" class="w-5 h-5 text-brand"></i>
            </div>
          </button>
        </div>

        <div class="glass-card rounded-3xl p-5">
          <div class="flex items-center justify-between">
            <h3 class="text-sm font-bold text-telegram-text">Features que você mais usa</h3>
            <button id="gameProfileRefresh" class="text-brand hover:text-brand-soft transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
          </div>
          <div id="gameTopFeatures" class="mt-3 space-y-2"></div>
        </div>

        <div class="glass-card alfredo-card rounded-3xl p-5">
          <p class="alfredo-kicker text-xs font-bold uppercase tracking-[0.2em]">Recadinho do Alfredo</p>
          <p id="gameAlfredoNote" class="alfredo-body mt-2 text-sm font-semibold">Carregando recomendação...</p>
        </div>

        <div class="glass-card rounded-3xl p-5">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-bold text-telegram-text">Ranking mensal</h3>
            <span id="gameRankingUpdatedAt" class="text-xs text-telegram-hint">--</span>
          </div>
          <div id="gameRankingList" class="space-y-2"></div>
          <button id="gameSeeRanking" class="mt-4 w-full rounded-xl bg-brand py-3 text-sm font-semibold text-white hover:bg-brand-soft transition">Veja o Ranking Mensal</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button onclick="switchTabByName('metas')" class="glass-card rounded-2xl p-4 text-left border border-brand/10 hover:border-brand/30 transition group">
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-telegram-hint group-hover:text-brand transition">Planejamento</p>
            <div class="flex items-center justify-between mt-2">
              <span class="text-sm font-bold text-telegram-text">Minhas Metas</span>
              <i data-lucide="target" class="w-4 h-4 text-brand"></i>
            </div>
          </button>
          <button onclick="openNotificacoesModal()" class="glass-card rounded-2xl p-4 text-left border border-brand/10 hover:border-brand/30 transition group">
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-telegram-hint group-hover:text-brand transition">Preferências</p>
            <div class="flex items-center justify-between mt-2">
              <span class="text-sm font-bold text-telegram-text">Notificações</span>
              <i data-lucide="bell" class="w-4 h-4 text-brand"></i>
            </div>
          </button>
        </div>

        <button id="gameBackHome" class="w-full rounded-xl border border-telegram-separator bg-telegram-card py-3 text-sm font-semibold text-telegram-text hover:bg-brand/5 transition">Voltar para o Início</button>
      </div>
    </section>
