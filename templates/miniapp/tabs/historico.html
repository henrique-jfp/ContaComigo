<section class="panel" id="historico">
      <div class="glass-card rounded-3xl p-6">
        <h2 class="text-sm font-semibold text-telegram-text mb-6 flex items-center justify-between">
          <span class="flex items-center gap-2"><i data-lucide="history" class="w-4 h-4 text-brand"></i> Histórico de Movimentações</span>
          <div class="flex gap-2">
            <button id="historyOpenFilters" class="p-2 rounded-xl border border-telegram-separator bg-telegram-card text-telegram-hint hover:text-brand transition" title="Filtrar">
              <i data-lucide="filter" class="w-4 h-4"></i>
            </button>
            <button id="historyRefresh" class="p-2 rounded-xl border border-telegram-separator bg-telegram-card text-telegram-hint hover:text-brand transition">
              <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
          </div>
        </h2>

        <!-- Input de busca rápida -->
        <div class="relative mb-4">
          <input id="historySearchInput" type="text" placeholder="Buscar descrição..." class="w-full pl-10 pr-4 py-2.5 rounded-2xl border border-telegram-separator bg-telegram-bg text-sm text-telegram-text focus:border-brand/40 outline-none transition">
          <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-telegram-hint"></i>
        </div>

        <p id="historyStatus" class="text-[10px] uppercase tracking-widest text-telegram-hint mb-3 font-bold px-1"></p>
        
        <div id="historyList" class="space-y-3"></div>
        
        <button id="historyLoadMore" class="w-full mt-6 py-3 border border-telegram-separator rounded-2xl text-xs font-bold text-telegram-hint hover:bg-brand/5 transition">
          CARREGAR MAIS LANÇAMENTOS
        </button>
      </div>
    </section>
