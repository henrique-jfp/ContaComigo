<section class="panel" id="historico">
      <div class="glass-card rounded-3xl p-6">
        <h2 class="text-sm font-semibold text-telegram-text mb-6 flex items-center justify-between">
          <span class="flex items-center gap-2 font-serif text-lg font-black tracking-tight"><i data-lucide="history" class="w-4 h-4 text-brand"></i> Histórico de Lançamentos</span>
          <div class="flex gap-2">
            <button id="historyOpenFilters" class="p-2 rounded-xl border border-white/5 bg-telegram-card text-telegram-hint hover:text-brand transition" title="Filtrar">
              <i data-lucide="filter" class="w-4 h-4"></i>
            </button>
            <button id="historyRefresh" class="p-2 rounded-xl border border-white/5 bg-telegram-card text-telegram-hint hover:text-brand transition">
              <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
          </div>
        </h2>

        <!-- Input de busca rápida -->
        <div class="relative mb-6">
          <input id="historySearchInput" type="text" placeholder="Pesquisar lançamentos..." class="w-full pl-11 pr-4 py-3 rounded-2xl border border-white/5 bg-black/20 text-sm text-telegram-text focus:border-brand/40 outline-none transition font-medium">
          <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-telegram-hint"></i>
        </div>

        <!-- Elemento oculto necessário para a lógica do app.js -->
        <input id="historyQuery" type="hidden" value="" />

        <p id="historyStatus" class="text-[9px] font-black uppercase tracking-[0.2em] text-brand mb-4 px-1 font-mono"></p>
        
        <div id="historyList" class="space-y-3"></div>
        
        <button id="historyLoadMore" class="w-full mt-6 py-3 border border-telegram-separator rounded-2xl text-xs font-bold text-telegram-hint hover:bg-brand/5 transition">
          CARREGAR MAIS LANÇAMENTOS
        </button>
      </div>
    </section>
