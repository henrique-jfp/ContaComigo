<section class="panel" id="historico">
      <div class="glass-card rounded-3xl p-6">
        <h2 class="text-sm font-semibold text-telegram-text mb-4 flex items-center justify-between">
          <span>Histórico de Movimentações</span>
          <button id="historyRefresh" class="text-brand hover:text-brand-soft transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
        </h2>

        <div class="mb-4 grid grid-cols-2 sm:grid-cols-4 gap-2">
          <select id="historyTipo" class="rounded-xl border border-telegram-separator bg-telegram-card px-3 py-2 text-xs text-telegram-text">
            <option value="">Todos</option>
            <option value="Entrada">Só Entradas</option>
            <option value="Saída">Só Saídas</option>
          </select>
          <select id="historyOrder" class="rounded-xl border border-telegram-separator bg-telegram-card px-3 py-2 text-xs text-telegram-text">
            <option value="added_desc">Recentes</option>
            <option value="date_desc">Data (↓)</option>
            <option value="date_asc">Data (↑)</option>
          </select>
          <input id="historyDate" type="date" class="col-span-2 sm:col-span-1 rounded-xl border border-telegram-separator bg-telegram-card px-3 py-2 text-xs text-telegram-text" />
          <button id="historyClearFilters" class="col-span-2 sm:col-span-1 rounded-xl border border-telegram-separator bg-telegram-card px-3 py-2 text-xs font-semibold text-telegram-text hover:bg-brand/5 transition">Limpar filtros</button>
        </div>
        <input id="historyQuery" type="hidden" value="" />

        <p id="historyStatus" class="text-xs text-slate-500 mb-3"></p>
        <div id="historyList" class="space-y-3"></div>
        <button id="historyLoadMore" class="w-full mt-4 py-2 border border-telegram-separator rounded-xl text-xs text-telegram-text hover:bg-brand/5 transition">Carregar mais</button>
      </div>
    </section>
