<section class="panel" id="modo-deus">
  <div class="pt-4 pb-32 px-4 space-y-6 overflow-y-auto h-full hide-scroll">
    <!-- BLOCO 1: Header com score financeiro -->
    <div class="flex items-center justify-between mb-2">
      <div>
        <h2 id="modoDeusMonthYear" class="text-xl font-bold text-telegram-text">--</h2>
        <button onclick="loadModoDeus(true)" class="text-[10px] font-bold text-brand mt-1 flex items-center gap-1">
          <i data-lucide="refresh-cw" class="w-3 h-3"></i> ↻ ATUALIZAR
        </button>
      </div>
      <div class="text-right">
        <div id="modoDeusScore" class="text-4xl font-black text-telegram-text leading-none">--</div>
        <p class="text-[10px] font-bold uppercase tracking-wider text-telegram-hint mt-1">saúde financeira</p>
      </div>
    </div>

    <!-- SKELETON LOADING -->
    <div id="modoDeusSkeleton" class="space-y-6">
      <div class="grid grid-cols-3 gap-3">
        <div class="skeleton h-20 rounded-xl"></div>
        <div class="skeleton h-20 rounded-xl"></div>
        <div class="skeleton h-20 rounded-xl"></div>
      </div>
      <div class="skeleton h-32 rounded-3xl"></div>
      <div class="skeleton h-48 rounded-3xl"></div>
    </div>

    <!-- CONTEÚDO REAL (Oculto inicialmente) -->
    <div id="modoDeusContent" class="hidden space-y-6">
      
      <!-- BLOCO 2: Cards de métricas principais -->
      <div class="grid grid-cols-3 gap-2">
        <div class="glass-card p-3 rounded-xl bg-telegram-card/50">
          <p class="text-[10px] text-telegram-hint mb-1">Patrimônio</p>
          <h3 id="mdPatrimonio" class="text-sm font-bold text-telegram-text truncate">--</h3>
          <p id="mdPatrimonioVar" class="text-[9px] mt-1">--</p>
        </div>
        <div class="glass-card p-3 rounded-xl bg-telegram-card/50">
          <p class="text-[10px] text-telegram-hint mb-1">Disponível</p>
          <h3 id="mdDisponivel" class="text-sm font-bold text-telegram-text truncate">--</h3>
          <p id="mdLimiteDiario" class="text-[9px] mt-1 text-telegram-hint">--/dia</p>
        </div>
        <div class="glass-card p-3 rounded-xl bg-telegram-card/50">
          <p class="text-[10px] text-telegram-hint mb-1">Resultado</p>
          <h3 id="mdResultado" class="text-sm font-bold truncate">--</h3>
          <p id="mdResultadoLabel" class="text-[9px] mt-1">no mês</p>
        </div>
      </div>

      <!-- BLOCO 3: Barra de cashflow visual -->
      <div class="glass-card p-5 rounded-3xl bg-telegram-card">
        <h3 id="mdCashflowTitle" class="text-xs font-bold text-telegram-text mb-4 uppercase tracking-widest">Fluxo de Caixa</h3>
        <div class="flex justify-between text-[11px] font-bold mb-2">
          <span id="mdEntradas" class="text-green-600">--</span>
          <span id="mdSaidas" class="text-red-600">--</span>
        </div>
        <div class="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden flex">
          <div id="mdBarEntrada" class="h-full bg-green-500 transition-all duration-1000" style="width: 0%"></div>
          <div id="mdBarSaida" class="h-full bg-red-500 transition-all duration-1000" style="width: 0%"></div>
        </div>
        <div class="mt-3 flex justify-between items-center text-[10px] text-telegram-hint">
          <span id="mdNetResult">--</span>
          <span id="mdDiasRestantes">-- dias restantes</span>
        </div>
      </div>

      <!-- BLOCO 4: Top categorias -->
      <div class="glass-card p-5 rounded-3xl bg-telegram-card">
        <h3 class="text-xs font-bold text-telegram-text mb-4 uppercase tracking-widest">Onde o dinheiro foi</h3>
        <div id="mdTopCategories" class="space-y-4">
          <!-- Injetado via JS -->
        </div>
      </div>

      <!-- BLOCO 5: Assinaturas + Parcelamentos -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Assinaturas -->
        <div class="glass-card p-5 rounded-3xl bg-telegram-card">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-xs font-bold text-telegram-text uppercase tracking-widest">Assinaturas</h3>
            <span id="mdTotalAssinaturas" class="px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 text-[10px] font-bold">--</span>
          </div>
          <div id="mdAssinaturasList" class="space-y-3">
            <!-- Injetado via JS -->
          </div>
        </div>
        <!-- Parcelamentos -->
        <div class="glass-card p-5 rounded-3xl bg-telegram-card">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-xs font-bold text-telegram-text uppercase tracking-widest">Parcelamentos</h3>
            <span id="mdTotalParcelas" class="px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 text-[10px] font-bold">--</span>
          </div>
          <div id="mdParcelasList" class="space-y-3">
            <!-- Injetado via JS -->
          </div>
        </div>
      </div>

      <!-- BLOCO 6: Faturas -->
      <div class="glass-card p-5 rounded-3xl bg-telegram-card">
        <h3 class="text-xs font-bold text-telegram-text mb-4 uppercase tracking-widest">Faturas em aberto</h3>
        <div id="mdCartoesList" class="space-y-4">
          <!-- Injetado via JS -->
        </div>
      </div>

      <!-- BLOCO 7: Metas + Orçamentos -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="glass-card p-5 rounded-3xl bg-telegram-card">
          <h3 class="text-xs font-bold text-telegram-text mb-4 uppercase tracking-widest">Metas</h3>
          <div id="mdMetasList" class="space-y-4"></div>
        </div>
        <div class="glass-card p-5 rounded-3xl bg-telegram-card">
          <h3 class="text-xs font-bold text-telegram-text mb-4 uppercase tracking-widest">Limites</h3>
          <div id="mdOrcamentosList" class="space-y-4"></div>
        </div>
      </div>

      <!-- BLOCO 8: Carteira FIIs -->
      <div id="mdFiisBlock" class="hidden glass-card p-5 rounded-3xl bg-telegram-card">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-xs font-bold text-telegram-text uppercase tracking-widest">Carteira de FIIs</h3>
          <span id="mdRendaFII" class="px-2 py-0.5 rounded-full bg-green-100 text-green-700 text-[10px] font-bold">--</span>
        </div>
        <div id="mdFiisList" class="space-y-3"></div>
      </div>

      <!-- BLOCO 9: Alertas do Alfredo -->
      <div id="mdAlertasBlock" class="hidden glass-card p-5 rounded-3xl bg-telegram-card border-l-4 border-brand">
        <h3 class="text-xs font-bold text-telegram-text mb-4 uppercase tracking-widest flex items-center gap-2">
          <i data-lucide="bell" class="w-3 h-3"></i> Alertas do Alfredo
        </h3>
        <div id="mdAlertasList" class="space-y-4"></div>
      </div>

      <!-- BLOCO 10: Próximos Vencimentos -->
      <div class="glass-card p-5 rounded-3xl bg-telegram-card">
        <h3 class="text-xs font-bold text-telegram-text mb-4 uppercase tracking-widest">Próximos 30 dias</h3>
        <div id="mdVencimentosList" class="space-y-3"></div>
      </div>

      <!-- BLOCO 11: Insights Rápidos -->
      <div id="mdInsightsBlock" class="glass-card p-5 rounded-3xl bg-telegram-card/50 border border-brand/10">
        <div id="mdInsightsList" class="space-y-2 text-xs text-telegram-text leading-relaxed">
          <!-- Injetado via JS -->
        </div>
      </div>

    </div>
  </div>
</section>
