<section class="panel active" id="inicio">
  <div class="space-y-4">
    <!-- NOVO CARD PREMIUM (Inspirado em novoCard.png) -->
    <div class="relative bg-white rounded-[32px] overflow-hidden shadow-lift min-h-[420px] home-reveal" style="--delay: 30ms">
      
      <!-- Fundo Diagonal (Verde / Vermelho) -->
      <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-br from-[#2a9757] via-[#2a9757] to-[#be123c]" 
             style="clip-path: polygon(0 45%, 100% 15%, 100% 100%, 0% 100%);"></div>
        <div class="absolute inset-0 bg-[#2a9757]" 
             style="clip-path: polygon(0 0, 100% 0, 100% 15%, 0 45%); opacity: 0.9;"></div>
      </div>

      <!-- Conteúdo do Card -->
      <div class="relative z-10 p-6 flex flex-col h-full">
        
        <!-- Topo: Resumo e Nível -->
        <div class="flex justify-between items-start gap-4">
          <!-- Box Branco de Resumo -->
          <div class="bg-white/95 backdrop-blur-sm p-5 rounded-2xl shadow-lg border border-slate-100 flex-1 max-w-[240px]">
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 font-mono leading-none mb-3">Resumo do mês</p>
            <h2 id="homeBalance" class="text-4xl font-black tracking-tighter text-slate-900 font-serif leading-tight">R$ 0,00</h2>
            <p id="homeBalanceHint" class="mt-3 text-[12px] font-bold text-slate-500 leading-snug">
              Você está fechando o mês no azul.
            </p>
          </div>

          <!-- Componente de Nível -->
          <button id="homeLevelCard" type="button" class="bg-white/95 backdrop-blur-sm rounded-2xl p-3 shadow-md border border-slate-100 flex flex-col items-center min-w-[90px] hover:scale-105 transition-transform">
            <div class="flex flex-col items-center gap-1 mb-1">
               <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">Nível</span>
               <div id="homeBadgeContainer" class="scale-90 h-6"></div>
            </div>
            <div id="homeLevel" class="text-3xl font-black text-[#7b1e2d] leading-none mb-1">1</div>
            <div class="text-[9px] font-bold text-slate-400 font-mono tracking-tighter"><span id="homeXp">0</span> XP</div>
            <div class="mt-2 bg-orange-50 px-2 py-0.5 rounded-full flex items-center gap-1">
               <i data-lucide="flame" class="w-3 h-3 text-orange-500 fill-orange-500"></i>
               <span id="homeStreak" class="text-[9px] font-black text-orange-600">0 DIAS</span>
            </div>
          </button>
        </div>

        <!-- Rodapé do Card: Receita e Despesa -->
        <div class="mt-auto flex flex-col gap-3 items-end pr-1 pt-24">
          
          <!-- Bolha de Receita -->
          <div class="bg-green-600/30 backdrop-blur-xl rounded-2xl px-5 py-2.5 flex items-center gap-3 border border-white/20 shadow-xl min-w-[180px]">
            <div class="bg-white/20 p-1.5 rounded-lg shadow-inner">
              <i data-lucide="banknote" class="w-5 h-5 text-white"></i>
            </div>
            <div class="flex flex-col">
              <span class="text-[8px] font-black uppercase tracking-widest text-white/80 leading-none">Receita</span>
              <span id="homeReceita" class="text-lg font-black text-white leading-tight">R$ 0,00</span>
            </div>
          </div>

          <!-- Bolha de Despesa -->
          <div class="bg-red-900/40 backdrop-blur-xl rounded-2xl px-5 py-2.5 flex items-center gap-3 border border-white/20 shadow-xl min-w-[180px]">
            <div class="bg-white/20 p-1.5 rounded-lg shadow-inner">
              <i data-lucide="shopping-cart" class="w-5 h-5 text-white"></i>
            </div>
            <div class="flex flex-col">
              <span class="text-[8px] font-black uppercase tracking-widest text-white/80 leading-none">Despesa</span>
              <span id="homeDespesa" class="text-lg font-black text-white leading-tight">R$ 0,00</span>
            </div>
          </div>

        </div>
      </div>

      <!-- Upgrade Button Overlay -->
      <button id="homeUpgradeBtn" class="hidden absolute top-4 left-4 z-20 bg-brand text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg border border-white/20">
        💎 Premium
      </button>
    </div>

    <!-- Seção de Gráficos e Insights -->
    <div class="space-y-3">
      <div class="home-reveal" style="--delay: 95ms">
        <div class="hide-scroll flex overflow-x-auto gap-2 pb-1" id="homeChartsPills">
          <button type="button" data-home-chart-pill="chart-patrimonio" class="rounded-full border border-brand/25 bg-brand/10 px-4 py-2 text-xs font-bold text-brand whitespace-nowrap transition">Patrimonio</button>
          <button type="button" data-home-chart-pill="chart-fluxo" class="rounded-full border border-telegram-separator bg-telegram-card px-4 py-2 text-xs font-semibold text-telegram-hint whitespace-nowrap transition">Fluxo de Caixa</button>
          <button type="button" data-home-chart-pill="chart-orcamento" class="rounded-full border border-telegram-separator bg-telegram-card px-4 py-2 text-xs font-semibold text-telegram-hint whitespace-nowrap transition">Orcamento vs Realizado</button>
          <button type="button" data-home-chart-pill="chart-distribuicao" class="rounded-full border border-telegram-separator bg-telegram-card px-4 py-2 text-xs font-semibold text-telegram-hint whitespace-nowrap transition">Distribuicao</button>
        </div>
      </div>

      <div id="homeChartCarousel" class="flex overflow-x-auto snap-x snap-mandatory hide-scroll gap-4 pb-4 home-reveal" style="--delay: 125ms">
        <article id="chart-patrimonio" data-home-chart-card class="min-w-full snap-center shrink-0 rounded-[24px] border border-telegram-separator bg-telegram-card p-5">
          <div class="mb-3 flex items-center justify-between">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.24em] text-brand-soft/90">Grafico 1</p>
              <h3 class="text-lg font-extrabold text-telegram-text">Evolucao Patrimonial</h3>
            </div>
            <i data-lucide="line-chart" class="h-5 w-5 text-brand"></i>
          </div>
          <div class="h-[280px]">
            <canvas id="homePatrimonyChart"></canvas>
          </div>
        </article>

        <article id="chart-fluxo" data-home-chart-card class="min-w-full snap-center shrink-0 rounded-[24px] border border-telegram-separator bg-telegram-card p-5">
          <div class="mb-3 flex items-center justify-between">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.24em] text-brand-soft/90">Grafico 2</p>
              <h3 class="text-lg font-extrabold text-telegram-text">Fluxo de Caixa</h3>
            </div>
            <i data-lucide="bar-chart-3" class="h-5 w-5 text-brand"></i>
          </div>
          <div class="h-[280px]">
            <canvas id="homeCashflowChart"></canvas>
          </div>
        </article>
      </div>

      <!-- Alfredo Insight -->
      <div class="glass-card alfredo-card home-reveal rounded-3xl p-6 shadow-soft" style="--delay: 165ms">
        <div class="alfredo-kicker mb-3 flex items-center gap-2 text-xs font-black uppercase tracking-[0.24em] text-brand">
          <i data-lucide="sparkles" class="h-4 w-4"></i>
          Alfredo em destaque
        </div>
        <p id="homeInsight" class="alfredo-body text-base font-semibold leading-relaxed text-slate-200">Carregando insight do Alfredo...</p>
      </div>

      <!-- Atalho Movimentações -->
      <div class="glass-card home-reveal rounded-3xl p-6 shadow-soft" style="--delay: 235ms">
        <div class="flex items-center justify-between mb-4">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.24em] text-brand-soft/90">Últimas movimentações</p>
            <h3 class="text-lg font-extrabold text-telegram-text">Ajustes rápidos</h3>
          </div>
          <button id="homeRecentRefresh" class="text-brand hover:text-brand-soft transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
        </div>
        <div id="homeRecentList" class="space-y-3"></div>
      </div>
    </div>
  </div>
</section>
