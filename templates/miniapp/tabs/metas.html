<section class="panel" id="metas">
      <div class="glass-card rounded-3xl p-6">
        <!-- Sub-navegação interna -->
        <div class="flex p-1 bg-telegram-bg border border-telegram-separator rounded-2xl mb-6">
          <button id="tabToggleMetas" class="flex-1 py-2 text-xs font-bold rounded-xl transition bg-brand text-white shadow-sm">🎯 Metas</button>
          <button id="tabToggleOrcamentos" class="flex-1 py-2 text-xs font-bold rounded-xl transition text-telegram-hint hover:text-telegram-text">📊 Orçamentos</button>
        </div>

        <!-- Conteúdo: Metas -->
        <div id="viewMetas" class="space-y-4">
          <h2 class="text-sm font-semibold text-telegram-text mb-6 flex items-center justify-between">
            <span class="flex items-center font-serif text-lg font-black tracking-tight"><i data-lucide="target" class="w-4 h-4 mr-2 text-brand"></i> Life Objectives</span>
            <div class="flex items-center gap-2">
              <button id="metaNew" class="p-2 rounded-xl border border-white/5 bg-telegram-card text-brand hover:bg-brand/5 transition"><i data-lucide="plus" class="w-4 h-4"></i></button>
              <button id="metaRefresh" class="p-2 rounded-xl border border-white/5 bg-telegram-card text-telegram-hint hover:text-brand transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
            </div>
          </h2>
          <p id="metaStatus" class="text-[9px] font-black uppercase tracking-[0.2em] text-brand font-mono px-1"></p>
          <div id="metaList" class="space-y-4"></div>
        </div>

        <!-- Conteúdo: Orçamentos (Oculto por padrão) -->
        <div id="viewOrcamentos" class="hidden space-y-4">
          <h2 class="text-sm font-semibold text-telegram-text mb-6 flex items-center justify-between">
            <span class="flex items-center font-serif text-lg font-black tracking-tight"><i data-lucide="pie-chart" class="w-4 h-4 mr-2 text-brand"></i> Expense Limits</span>
            <button id="orcamentoNew" class="p-2 rounded-xl border border-white/5 bg-telegram-card text-brand hover:bg-brand/5 transition"><i data-lucide="plus" class="w-4 h-4"></i></button>
          </h2>
          <div id="orcamentoList" class="space-y-4">
              <div class="text-[10px] text-telegram-hint text-center p-8 border border-dashed rounded-3xl border-white/10 font-mono uppercase tracking-widest">Awaiting data...</div>
          </div>
        </div>
      </div>
    </section>
