<section class="panel" id="fantasma">
  <div class="pt-4 pb-32 px-4 space-y-6">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-xl font-bold bg-gradient-to-r from-purple-400 to-fuchsia-600 bg-clip-text text-transparent drop-shadow-md">
        <i data-lucide="ghost" class="inline-block mr-1 text-purple-500 w-5 h-5 align-text-bottom"></i> Pierre Finance
      </h2>
      <button id="pierreRefreshBtn" onclick="loadPierreDashboard()" class="p-2 rounded-xl bg-purple-500/10 text-purple-400 hover:bg-purple-500/20 transition">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
      </button>
    </div>

    <!-- MODO DEUS: KPIs PRINCIPAIS -->
    <div class="grid grid-cols-2 gap-3">
      <div class="glass-card p-4 rounded-2xl border border-purple-500/20 bg-purple-900/5">
        <p class="text-[10px] font-bold uppercase tracking-wider text-purple-400/80 mb-1">Patrimônio Total</p>
        <h3 id="pierreTotalBalance" class="text-xl font-extrabold text-telegram-text">R$ 0,00</h3>
        <p class="text-[9px] text-telegram-hint mt-1">Soma de todas as contas</p>
      </div>
      <div class="glass-card p-4 rounded-2xl border border-purple-500/20 bg-purple-900/5 text-center">
        <p class="text-[10px] font-bold uppercase tracking-wider text-purple-400/80 mb-1">Saúde Financeira</p>
        <div class="flex items-center justify-center gap-2">
          <span id="pierreHealthScore" class="text-2xl font-black text-fuchsia-500">--</span>
          <span id="pierreHealthLabel" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-fuchsia-500/10 text-fuchsia-400">---</span>
        </div>
      </div>
    </div>

    <!-- GRÁFICO: VILÕES DO OPEN FINANCE -->
    <div class="glass-card p-5 rounded-3xl border border-purple-500/20 bg-purple-900/5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-bold text-telegram-text flex items-center gap-2">
          <i data-lucide="pie-chart" class="w-4 h-4 text-purple-500"></i> Vilões do Open Finance
        </h3>
        <span class="text-[10px] text-telegram-hint">Últimos 30 dias</span>
      </div>
      <div class="h-[200px] relative">
        <canvas id="pierreCategoriesChart"></canvas>
        <div id="pierreCategoriesEmpty" class="absolute inset-0 flex items-center justify-center text-xs text-telegram-hint hidden">
          Nenhum gasto mapeado ainda.
        </div>
      </div>
    </div>

    <!-- RADAR DE PARCELAS -->
    <div class="glass-card p-5 rounded-3xl border border-purple-500/20 bg-purple-900/5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-bold text-telegram-text flex items-center gap-2">
          <i data-lucide="credit-card" class="w-4 h-4 text-purple-500"></i> Radar de Parcelas
        </h3>
        <button onclick="loadPierreParcelamentos()" class="text-[10px] font-bold text-purple-400">Ver Todas</button>
      </div>
      <div id="pierreInstallmentsList" class="space-y-3">
        <div class="text-center py-4 text-xs text-telegram-hint">Buscando compromissos...</div>
      </div>
    </div>

    <!-- AÇÕES ADICIONAIS -->
    <div class="grid grid-cols-2 gap-3">
      <button onclick="downloadPierreLivroCaixa()" class="flex items-center justify-center gap-2 p-3 rounded-2xl bg-slate-800/40 border border-slate-700 text-xs font-bold text-slate-300 hover:bg-slate-800 transition">
        <i data-lucide="file-text" class="w-4 h-4"></i> Exportar PDF
      </button>
      <button onclick="window.Telegram.WebApp.showAlert('O Alfredo sincroniza seus bancos a cada 6 horas automaticamente.')" class="flex items-center justify-center gap-2 p-3 rounded-2xl bg-slate-800/40 border border-slate-700 text-xs font-bold text-slate-300 hover:bg-slate-800 transition">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i> Info Sincronia
      </button>
    </div>

    <!-- Zona de Perigo -->
    <div class="pt-4 border-t border-red-500/10">
      <button id="pierreRevogarBtn" onclick="window.Telegram.WebApp.showConfirm('Tem certeza que deseja revogar o acesso do Alfredo ao seu Open Finance? Isso não pode ser desfeito.', function(ok) { if(ok) window.Telegram.WebApp.showAlert('Integração de revogação pendente.'); })" class="w-full py-3 rounded-xl border border-red-500/30 text-red-400 text-[10px] font-bold uppercase tracking-widest hover:bg-red-500/10 transition flex items-center justify-center gap-2">
        <i data-lucide="shield-alert" class="w-3 h-3"></i> Revogar Acesso Open Finance
      </button>
    </div>
  </div>
</section>
